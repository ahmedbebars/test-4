name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create Google Services Folder
      run: mkdir -p app/src/debug app/src/release

    - name: Create Mock Google Services File
      run: |
        cat <<EOF > app/google-services.json
        {
          "project_info": { "project_number": "0", "project_id": "mock", "storage_bucket": "mock.appspot.com" },
          "client": [ { "client_info": { "mobilesdk_app_id": "1:0:android:0", "android_client_info": { "package_name": "com.example.myapplication" } }, "oauth_client": [], "api_key": [ { "current_key": "mock" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
          "configuration_version": "1"
        }
        EOF

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mithaq-App-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
